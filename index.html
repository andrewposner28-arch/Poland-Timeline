<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poland: Cold War Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #c0392b; --white: #f5f0e8; --dark: #1a1a2e;
    --mid: #2e2e4e; --gold: #d4a843; --muted: #8888aa; --line: #3a3a5c;
  }
  html, body { width: 100%; height: 100%; background: var(--dark); color: var(--white); font-family: 'Source Sans 3', sans-serif; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; width: 100%; }

  header {
    flex-shrink: 0;
    background: linear-gradient(135deg, #0d0d1f 0%, #1a1a2e 60%, #2e1a1a 100%);
    border-bottom: 2px solid var(--red);
    padding: 14px 28px 10px;
    display: flex; align-items: center; gap: 18px;
  }
  .flag { display: flex; flex-direction: column; width: 36px; height: 24px; border-radius: 3px; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
  .flag .w { flex: 1; background: #fff; }
  .flag .r { flex: 1; background: var(--red); }
  .header-text h1 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 900; letter-spacing: .04em; color: var(--white); line-height: 1.1; }
  .header-text p { font-size: .72rem; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }

  #dot-nav {
    flex-shrink: 0; background: var(--mid); border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 44px; gap: 4px; overflow-x: auto; scrollbar-width: none;
  }
  #dot-nav::-webkit-scrollbar { display: none; }
  .dot-btn { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; background: none; border: none; color: var(--muted); font-family: 'Source Sans 3', sans-serif; font-size: .65rem; letter-spacing: .06em; transition: color .2s; }
  .dot-btn:hover { color: var(--gold); }
  .dot-btn.active { color: var(--white); }
  .dot-pip { width: 8px; height: 8px; border-radius: 50%; background: var(--line); border: 2px solid var(--muted); transition: background .25s, border-color .25s, transform .25s; }
  .dot-btn.active .dot-pip { background: var(--red); border-color: var(--red); transform: scale(1.4); }
  .dot-btn:hover .dot-pip { border-color: var(--gold); }

  #viewport { flex: 1; position: relative; overflow: hidden; }

  .card {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: 1fr 1fr;
    opacity: 0; pointer-events: none;
    transform: translateX(60px);
    transition: opacity .45s cubic-bezier(.4,0,.2,1), transform .45s cubic-bezier(.4,0,.2,1);
  }
  .card.active { opacity: 1; pointer-events: all; transform: translateX(0); }
  .card.exit-left { opacity: 0; transform: translateX(-60px); }

  .card-left {
    padding: 28px 28px 24px 32px;
    display: flex; flex-direction: column;
    position: relative; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--line) transparent;
  }
  .card-left::before {
    content: ''; position: absolute; left: 0; top: 20px; bottom: 20px;
    width: 4px; background: linear-gradient(180deg, var(--red), transparent);
    border-radius: 0 2px 2px 0;
  }
  .card-year { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900; color: var(--red); line-height: 1; opacity: .15; position: absolute; top: 12px; right: 16px; user-select: none; }
  .card-tag { font-size: .65rem; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 700; color: var(--white); line-height: 1.25; margin-bottom: 12px; max-width: 85%; }
  .card-divider { width: 48px; height: 2px; background: var(--red); margin-bottom: 12px; border-radius: 1px; }
  .card-body { font-size: .9rem; line-height: 1.7; color: #c8c8e0; }

  .card-right {
    position: relative; overflow: hidden;
    border-left: 1px solid var(--line);
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    filter: grayscale(20%) brightness(0.85);
    transition: filter .4s;
  }
  .card-img:hover { filter: grayscale(0%) brightness(1); }
  .img-caption {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 14px;
    background: linear-gradient(transparent, rgba(10,10,20,.85));
    font-size: .68rem; color: rgba(200,200,220,.8);
    letter-spacing: .04em;
  }
  .img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--mid); color: var(--muted); font-size: .85rem;
    letter-spacing: .06em;
  }

  #progress { position: absolute; bottom: 0; left: 0; height: 3px; background: var(--red); transition: width .45s cubic-bezier(.4,0,.2,1); border-radius: 0 2px 0 0; }

  footer { flex-shrink: 0; background: var(--mid); border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; gap: 12px; }
  .ctrl-btn { background: none; border: 1px solid var(--line); color: var(--white); font-family: 'Source Sans 3', sans-serif; font-size: .8rem; letter-spacing: .08em; padding: 7px 20px; border-radius: 3px; cursor: pointer; transition: background .2s, border-color .2s; }
  .ctrl-btn:hover:not(:disabled) { background: var(--line); border-color: var(--muted); }
  .ctrl-btn:disabled { opacity: .3; cursor: default; }
  .ctrl-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
  .ctrl-btn.primary:hover:not(:disabled) { background: #a93226; }
  .counter { font-size: .75rem; color: var(--muted); letter-spacing: .1em; white-space: nowrap; }

  @media (max-width: 600px) {
    .card { grid-template-columns: 1fr; grid-template-rows: auto 220px; }
    .card-right { border-left: none; border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="flag"><div class="w"></div><div class="r"></div></div>
    <div class="header-text">
      <h1>Poland &amp; the Cold War</h1>
      <p>1945 – 1991 &nbsp;·&nbsp; Key Events</p>
    </div>
  </header>
  <div id="dot-nav"></div>
  <div id="viewport">
    <div id="progress"></div>
  </div>
  <footer>
    <button class="ctrl-btn" id="btn-prev">← Prev</button>
    <span class="counter" id="counter"></span>
    <button class="ctrl-btn primary" id="btn-next">Next →</button>
  </footer>
</div>

<script>
const events = [
  {
    year: "1945–47", tag: "Post-War Occupation", title: "Soviet Control",
    body: "After WWII ended, the Soviet Union installed a communist government in Poland, sidelining democratic aspirations. Opposition parties were systematically weakened, the 1947 elections were tightly controlled, and Poland was absorbed into the Soviet sphere of influence — reshaping its government, economy, and foreign policy for decades.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/08/Warsaw_Old_Town_1945.jpg/800px-Warsaw_Old_Town_1945.jpg",
    caption: "Warsaw, 1945 — aftermath of WWII and the beginning of Soviet-backed rule"
  },
  {
    year: "1955", tag: "Military Alliance", title: "Poland Joins the Warsaw Pact",
    body: "Poland formally joined the Warsaw Pact, a Soviet-led military alliance created as a counterweight to NATO. Membership tightened Poland's alignment with Soviet military objectives, eroded independent foreign policy, and kept Soviet troops stationed on Polish soil — cementing its place within the Eastern Bloc.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Warsaw_Pact_Nations.png/800px-Warsaw_Pact_Nations.png",
    caption: "Warsaw Pact member states, 1955 — Poland firmly within the Soviet sphere"
  },
  {
    year: "1956", tag: "Workers' Uprising", title: "Poznań Protests",
    body: "Workers in Poznań took to the streets over poor wages, harsh living conditions, and communist misrule. The government's violent military response killed and injured many demonstrators. The uprising exposed the depth of anti-communist anger and led to Władysław Gomułka's return to power with promises of limited reform.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b6/Poznan_1956.jpg/800px-Poznan_1956.jpg",
    caption: "Poznań, June 1956 — workers march against communist rule"
  },
  {
    year: "1968", tag: "Censorship & Repression", title: "Student Protests & Crackdowns",
    body: "Students and intellectuals rose up against censorship and the absence of basic freedoms. The communist government responded with mass arrests and a brutal crackdown. Simultaneously, an officially orchestrated anti-Semitic campaign forced thousands of Polish Jews into exile, deepening the chasm between citizens and the state.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Marzec_1968_Warszawa.jpg/800px-Marzec_1968_Warszawa.jpg",
    caption: "Warsaw, March 1968 — student demonstrations met with state repression"
  },
  {
    year: "1970", tag: "Labor Unrest", title: "Baltic Coast Worker Protests",
    body: "Rising food prices and deteriorating economic conditions drove workers in Baltic coast cities to strike and march. The government's violent suppression left dozens dead. The crisis forced communist leader Gomułka from office and planted seeds for the labor movement that would flourish a decade later.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/36/Strajk_Szczecin_1970.jpg/800px-Strajk_Szczecin_1970.jpg",
    caption: "Szczecin, December 1970 — workers strike along the Baltic coast"
  },
  {
    year: "1978", tag: "Spiritual Inspiration", title: "Election of Pope John Paul II",
    body: "Kraków cardinal Karol Wojtyła became Pope John Paul II — the first non-Italian pope in over four centuries. His 1979 visit drew millions and carried powerful messages of human dignity and freedom. His moral authority emboldened ordinary Poles to resist communism.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/John_Paul_II_at_Auschwitz_-_Birkenau_1979.jpg/800px-John_Paul_II_at_Auschwitz_-_Birkenau_1979.jpg",
    caption: "Pope John Paul II visits Poland, 1979 — drawing millions with messages of freedom"
  },
  {
    year: "1980", tag: "Birth of Solidarity", title: "Creation of Solidarity",
    body: "Workers at the Gdańsk shipyard, led by electrician Lech Wałęsa, founded Solidarity — the first independent trade union in the communist Eastern Bloc. Millions joined demanding workers' rights and political reform. Solidarity became a worldwide symbol of peaceful resistance to Soviet-backed authoritarianism.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Lech_Walesa_1980_Gdansk.jpg/800px-Lech_Walesa_1980_Gdansk.jpg",
    caption: "Gdańsk shipyard, 1980 — Lech Wałęsa and the birth of the Solidarity movement"
  },
  {
    year: "1981", tag: "State Crackdown", title: "Martial Law in Poland",
    body: "Fearing Solidarity's growing power, communist leader Wojciech Jaruzelski declared martial law. Thousands of activists were interned, civil liberties suspended, and daily life came under military control. Though Solidarity was driven underground, resistance persisted and martial law convinced many that communism could not govern effectively.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Martial_law_in_Poland_-_BWA_Wroclaw.jpg/800px-Martial_law_in_Poland_-_BWA_Wroclaw.jpg",
    caption: "Poland, December 1981 — military patrols enforce martial law on city streets"
  },
  {
    year: "1989", tag: "Democratic Breakthrough", title: "Round Table Talks & Free Elections",
    body: "Crushed by economic crisis and mounting public pressure, the communist government negotiated with Solidarity at the historic Round Table Talks. The resulting partially free elections saw Solidarity win an overwhelming mandate, ending communist rule. Poland became a pioneering example of peaceful democratic transition in Eastern Europe.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Okragly_stol.jpg/800px-Okragly_stol.jpg",
    caption: "Warsaw, 1989 — the Round Table Talks that ended communist rule in Poland"
  },
  {
    year: "1991", tag: "New Era", title: "End of Communist Rule",
    body: "With communist rule fully dismantled and the Soviet Union dissolved, Poland embarked on building democratic institutions and a market economy. It forged closer ties with Western Europe and the United States — a path that led to NATO membership in 1999 and EU accession in 2004.",
    img: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Poland_1989_election_results.png/800px-Poland_1989_election_results.png",
    caption: "Poland's 1989 election results — a sweeping mandate for Solidarity and democracy"
  }
];

let current = 0;
const viewport = document.getElementById('viewport');
const progress = document.getElementById('progress');
const dotNav   = document.getElementById('dot-nav');
const counter  = document.getElementById('counter');
const btnPrev  = document.getElementById('btn-prev');
const btnNext  = document.getElementById('btn-next');

const cards = events.map((ev, i) => {
  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-left">
      <div class="card-year">${ev.year}</div>
      <div class="card-tag">${ev.tag}</div>
      <h2 class="card-title">${ev.title}</h2>
      <div class="card-divider"></div>
      <p class="card-body">${ev.body}</p>
    </div>
    <div class="card-right">
      <img class="card-img" src="${ev.img}" alt="${ev.title}" onerror="this.parentElement.innerHTML='<div class=\'img-placeholder\'>Image unavailable</div>'" />
      <div class="img-caption">${ev.caption}</div>
    </div>
  `;
  viewport.appendChild(el);
  return el;
});

events.forEach((ev, i) => {
  const btn = document.createElement('button');
  btn.className = 'dot-btn';
  btn.innerHTML = `<div class="dot-pip"></div><span>${ev.year.split('–')[0]}</span>`;
  btn.addEventListener('click', () => goTo(i));
  dotNav.appendChild(btn);
});

function getDots() { return dotNav.querySelectorAll('.dot-btn'); }

function render() {
  getDots().forEach((d, i) => d.classList.toggle('active', i === current));
  cards.forEach((c, i) => {
    c.classList.remove('active', 'exit-left');
    if (i === current) setTimeout(() => c.classList.add('active'), 20);
  });
  progress.style.width = ((current + 1) / events.length * 100) + '%';
  counter.textContent = `${current + 1} / ${events.length}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === events.length - 1;
  btnNext.textContent = current === events.length - 1 ? 'End' : 'Next →';
}

function goTo(idx) {
  if (idx === current) return;
  if (idx > current) cards[current].classList.remove('active');
  else cards[current].classList.add('exit-left');
  current = idx;
  render();
}

btnPrev.addEventListener('click', () => { if (current > 0) goTo(current - 1); });
btnNext.addEventListener('click', () => { if (current < events.length - 1) goTo(current + 1); });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && current < events.length - 1) goTo(current + 1);
  if (e.key === 'ArrowLeft'  && current > 0) goTo(current - 1);
});

cards[0].style.transition = 'none';
cards[0].classList.add('active');
setTimeout(() => { cards[0].style.transition = ''; }, 50);
render();
</script>
</body>
</html>
